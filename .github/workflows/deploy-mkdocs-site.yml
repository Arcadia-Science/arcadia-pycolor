# Copied from: https://squidfunk.github.io/mkdocs-material/publishing-your-site/.
name: deploy-mkdocs-site

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:      
      - uses: actions/checkout@v6
        # Fetching the full git history is necessary because hatch-vcs derives the package version
        # from git tags, and this runs even when the package is installed locally (as we do below).
        with:
          fetch-depth: 0

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Deploy MkDocs site
        run: uv run mkdocs gh-deploy --force

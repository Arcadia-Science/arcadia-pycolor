name: lint-and-test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        # Fetching the full git history is necessary because hatch-vcs derives the package version
        # from git tags, and this runs even when the package is installed locally (as we do below).
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run Ruff
        run: uv run ruff check --output-format=github .

      - name: Run Ruff formatter
        run: uv run ruff format --check .

      # Kaleido v1 no longer bundles Chrome; it must be installed separately for
      # static image export (used by `plotly.save_figure` and its tests).
      - name: Install Chrome for Kaleido
        run: uv run plotly_get_chrome -y

      - name: Run tests
        run: uv run pytest

      - name: Execute notebooks
        run: make execute-all-notebooks

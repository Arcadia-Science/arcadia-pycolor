[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "arcadia-pycolor"
dynamic = ["version"]
description = "A Python package to distribute Arcadia's color and style guidelines for figures."
readme = "README.md"
license = {file = "LICENSE"}
authors = [
    { name = "Dennis Sun", email = "dennis.sun@arcadiascience.com" },
]
dependencies = [
    "colorspacious >= 1.1.2",
    "ipython >= 8.16.1",
    "matplotlib >= 3.8.0",
    "numpy >= 1.26.0",
    "plotly >= 5.17.0",
]

[project.urls]
Homepage = "https://github.com/Arcadia-Science/arcadia-pycolor"

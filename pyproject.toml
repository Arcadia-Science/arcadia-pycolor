[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arcadia-pycolor"
dynamic = ["version"]
description = "A Python package to distribute Arcadia's color and style guidelines for figures."
readme = "README.md"
license = "MIT"
authors = [
    { name = "Dennis Sun", email = "dennis.sun@arcadiascience.com" },
]
dependencies = [
    "colorspacious",
    "ipython",
    "matplotlib",
    "numpy",
    "plotly",
]

[project.urls]
Homepage = "https://github.com/Arcadia-Science/arcadia-pycolor"

[tool.hatch.version]
path = "arcadia_pycolor/__init__.py"

[tool.hatch.build.targets.sdist]
include = [
    "/arcadia_pycolor",
]
